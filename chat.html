<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魷魚大師 AI 助理</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a; color: #e2e8f0;
            height: 100dvh; display: flex; flex-direction: column;
        }
        nav {
            background: #1e293b; border-bottom: 1px solid #334155;
            padding: 12px 16px; display: flex; align-items: center;
            justify-content: space-between; flex-shrink: 0;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .nav-logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 18px;
        }
        .nav-title { font-size: 16px; font-weight: 700; color: #f8fafc; }
        .nav-sub { font-size: 11px; color: #94a3b8; }
        .nav-back {
            color: #94a3b8; font-size: 13px; text-decoration: none;
            padding: 6px 12px; border: 1px solid #334155;
            border-radius: 8px; transition: all 0.2s;
        }
        .nav-back:hover { border-color: #64748b; color: #e2e8f0; }
        #member-bar {
            background: #1e293b; border-bottom: 1px solid #334155;
            padding: 8px 16px; font-size: 12px; color: #94a3b8;
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
        }
        #member-bar.logged-in { color: #34d399; }
        #chat-messages {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .msg {
            max-width: 85%; padding: 10px 14px; border-radius: 16px;
            font-size: 14px; line-height: 1.6; word-break: break-word;
        }
        .msg.user {
            background: #f59e0b; color: #1a1a1a;
            align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500;
        }
        .msg.ai {
            background: #1e293b; border: 1px solid #334155;
            color: #e2e8f0; align-self: flex-start; border-bottom-left-radius: 4px;
        }
        .msg.ai.thinking { color: #64748b; font-style: italic; }
        #quick-questions {
            padding: 8px 16px; display: flex; gap: 8px;
            overflow-x: auto; flex-shrink: 0; border-top: 1px solid #1e293b;
        }
        #quick-questions::-webkit-scrollbar { display: none; }
        .quick-btn {
            white-space: nowrap; padding: 6px 12px; background: #1e293b;
            border: 1px solid #334155; color: #94a3b8; border-radius: 20px;
            font-size: 12px; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        .quick-btn:hover { border-color: #f59e0b; color: #f59e0b; }
        #input-area {
            background: #1e293b; border-top: 1px solid #334155;
            padding: 12px 16px; display: flex; gap: 8px; align-items: flex-end;
            flex-shrink: 0; padding-bottom: max(12px, env(safe-area-inset-bottom));
        }
        #user-input {
            flex: 1; background: #0f172a; border: 1px solid #334155;
            border-radius: 12px; padding: 10px 14px; color: #e2e8f0;
            font-size: 14px; resize: none; outline: none;
            min-height: 42px; max-height: 120px; line-height: 1.5;
            transition: border-color 0.2s; font-family: inherit;
        }
        #user-input:focus { border-color: #f59e0b; }
        #user-input::placeholder { color: #475569; }
        #send-btn {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none; border-radius: 12px; color: #1a1a1a; font-size: 18px;
            cursor: pointer; flex-shrink: 0; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s;
        }
        #send-btn:hover { transform: scale(1.05); }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
<nav>
    <div class="nav-left">
        <div class="nav-logo">🦑</div>
        <div>
            <div class="nav-title">魷魚大師 AI 助理</div>
            <div class="nav-sub">綠佳利專屬智慧顧問</div>
        </div>
    </div>
    <a href="./explore-life.html" class="nav-back">← 返回</a>
</nav>

<div id="member-bar">👤 載入中...</div>

<div id="chat-messages">
    <div class="msg ai">
        你好！我是魷魚大師 AI 助理 🦑<br><br>
        我專門解答關於綠佳利產品、健康管理、以及財務自由的問題。有什麼可以幫你的嗎？
    </div>
</div>

<div id="quick-questions">
    <button class="quick-btn" onclick="sendQuick('綠佳利的產品有哪些？')">綠佳利產品介紹</button>
    <button class="quick-btn" onclick="sendQuick('KC健康指數是什麼？')">KC指數說明</button>
    <button class="quick-btn" onclick="sendQuick('如何加入成為會員？')">如何加入</button>
    <button class="quick-btn" onclick="sendQuick('傳直銷和一般工作有什麼不同？')">傳直銷優勢</button>
    <button class="quick-btn" onclick="sendQuick('如何開始建立被動收入？')">被動收入</button>
</div>

<div id="input-area">
    <textarea id="user-input" placeholder="輸入你的問題..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
const WORKER_URL = 'https://npplus-proxy.randoph520.workers.dev/claude';
const SYSTEM_PROMPT = `你是「魷魚大師 AI 助理」，專屬於綠佳利（環貫綠佳利）的智慧健康顧問。
你的角色：
- 協助解答關於綠佳利產品的問題（MP綜合植化素、IM富氫水、SR相關產品）
- 解釋 KC 健康指數（MSRRS光譜檢測）的意義
- 分享健康管理和預防再生的觀念
- 介紹傳直銷的商業模式和優勢
- 協助用戶了解財務自由和被動收入的概念
回答風格：
- 絕對不要提「競品」「競品分析」這些詞，介紹其他品牌產品時請中立客觀描述
- 只說資料庫中有的內容，不要自行推測或補充資料庫沒有的產品成分或功效
- 使用繁體中文
- 親切友善，像朋友一樣交談
- 回答簡潔有力，不要太長
- 適時使用emoji增加親和力`;

let messages = [];
let isLoading = false;

window.onload = () => {
    const memberCode = localStorage.getItem('gameMemberCode') || '';
    const memberName = localStorage.getItem('gamePlayerName') || '';
    const bar = document.getElementById('member-bar');
    if (memberCode) {
        bar.textContent = `👤 ${memberName || '會員'} · ${memberCode}`;
        bar.classList.add('logged-in');
    } else {
        bar.textContent = '👤 訪客模式';
    }
};

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function sendQuick(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
}

async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || isLoading) return;
    input.value = ''; input.style.height = 'auto';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    appendMsg(text, 'user');
    messages.push({ role: 'user', content: text });
    const thinkingEl = appendMsg('思考中...', 'ai thinking');
    try {
        const res = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'claude-haiku-4-5',
                max_tokens: 1000,
                system: SYSTEM_PROMPT,
                messages: messages
            })
        });
        const data = await res.json();
        const reply = data.content?.[0]?.text || '抱歉，我暫時無法回應，請稍後再試。';
        thinkingEl.innerHTML = formatMsg(reply);
        thinkingEl.classList.remove('thinking');
        messages.push({ role: 'assistant', content: reply });
        if (messages.length > 20) messages = messages.slice(-20);
    } catch(e) {
        thinkingEl.textContent = '連線失敗，請稍後再試 😔';
        thinkingEl.classList.remove('thinking');
    }
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
}

function formatMsg(text) {
    return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
}

function appendMsg(text, className) {
    const el = document.createElement('div');
    el.className = `msg ${className}`;
    if (className.includes('ai') && !className.includes('thinking')) {
        el.innerHTML = formatMsg(text);
    } else {
        el.textContent = text;
    }
    const container = document.getElementById('chat-messages');
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
    return el;
}
</script>
</body>
</html>
