<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>綠佳利 AI 助理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-mid: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #b7e4c7;
    --gold: #d4a942;
    --gold-light: #f0c96e;
    --bg: #0d1f17;
    --surface: #1c3326;
    --surface2: #234030;
    --text: #e8f5ee;
    --text-dim: #8ab89a;
    --border: #2d5040;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(82,183,136,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(212,169,66,0.06) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  header {
    position: relative; z-index: 10; padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
    background: rgba(18,32,24,0.97); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--green-mid), var(--green-light));
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0; box-shadow: 0 4px 16px rgba(82,183,136,0.3);
  }
  .header-text h1 { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--green-pale); }
  .header-text p { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
  .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
  .status::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: var(--green-light); box-shadow: 0 0 8px var(--green-light);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #chat { flex: 1; overflow-y: auto; padding: 20px 16px; position: relative; z-index: 1; scroll-behavior: smooth; }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .welcome {
    max-width: 760px; margin: 0 auto 20px; padding: 18px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); border-left: 3px solid var(--gold);
  }
  .welcome h2 { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--gold-light); margin-bottom: 7px; }
  .welcome p { font-size: 13px; color: var(--text-dim); line-height: 1.7; }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; }
  .chip {
    padding: 5px 12px; background: rgba(212,169,66,0.1);
    border: 1px solid rgba(212,169,66,0.25); border-radius: 20px;
    font-size: 12px; color: var(--gold-light); cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; transition: all 0.2s;
  }
  .chip:hover { background: rgba(212,169,66,0.2); transform: translateY(-1px); }

  .msg { display: flex; gap: 10px; margin-bottom: 16px; animation: fadeUp 0.3s ease; max-width: 760px; margin-left: auto; margin-right: auto; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }
  .msg.ai .avatar { background: linear-gradient(135deg, var(--green-mid), var(--green-light)); box-shadow: 0 2px 10px rgba(82,183,136,0.25); }
  .msg.user .avatar { background: var(--surface2); border: 1px solid var(--border); }
  .bubble { padding: 12px 15px; border-radius: var(--radius); font-size: 14px; line-height: 1.75; max-width: calc(100% - 44px); }
  .msg.ai .bubble { background: var(--surface); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .msg.user .bubble { background: linear-gradient(135deg, var(--green-mid), #3a8a63); border-top-right-radius: 4px; color: #fff; }

  .thinking { display: flex; gap: 5px; align-items: center; padding: 12px 15px; }
  .thinking span { width: 7px; height: 7px; border-radius: 50%; background: var(--green-light); animation: bounce 1.2s infinite; }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }

  .input-area {
    position: relative; z-index: 10; padding: 14px 16px;
    background: rgba(18,32,24,0.97); border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .input-wrap { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  textarea {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 11px 15px; color: var(--text);
    font-family: 'Noto Sans TC', sans-serif; font-size: 14px;
    resize: none; min-height: 46px; max-height: 130px; outline: none;
    transition: border-color 0.2s; line-height: 1.5;
  }
  textarea::placeholder { color: var(--text-dim); }
  textarea:focus { border-color: var(--green-light); box-shadow: 0 0 0 3px rgba(82,183,136,0.1); }
  .send-btn {
    width: 46px; height: 46px; border-radius: 12px;
    background: linear-gradient(135deg, var(--green-mid), var(--green-light));
    border: none; cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 17px; transition: all 0.2s; flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(82,183,136,0.3);
  }
  .send-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(82,183,136,0.4); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .highlight { color: var(--gold-light); font-weight: 500; }
  @media(max-width:600px) {
    header { padding: 10px 14px; }
    #chat { padding: 14px 10px; }
    .input-area { padding: 10px 12px; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">🌿</div>
  <div class="header-text">
    <h1>綠佳利 AI 助理</h1>
    <p>再生醫學 · 事業諮詢 · 疑慮解答</p>
  </div>
  <div class="status">線上服務中</div>
</header>

<div id="chat">
  <div class="welcome">
    <h2>您好，我是綠佳利 AI 助理 ✨</h2>
    <p>我可以協助了解產品知識、事業制度、疑慮解答，以及與其他品牌的比較分析。請直接輸入您的問題！</p>
    <div class="chips">
      <span class="chip" onclick="quickAsk('喚活產品有什麼特色？')">🌱 產品特色</span>
      <span class="chip" onclick="quickAsk('綠佳利的獎金制度怎麼運作？')">💰 獎金制度</span>
      <span class="chip" onclick="quickAsk('有人說這是老鼠會，怎麼回答？')">🛡️ 疑慮處理</span>
      <span class="chip" onclick="quickAsk('跟安麗相比有什麼優勢？')">⚡ 競品比較</span>
      <span class="chip" onclick="quickAsk('我沒有時間，可以兼職嗎？')">⏰ 時間疑慮</span>
      <span class="chip" onclick="quickAsk('這家公司合法嗎？')">✅ 合法查詢</span>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" placeholder="輸入您的問題..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const WORKER = "https://npplus-proxy.randoph520.workers.dev";
let busy = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function quickAsk(q) {
  document.getElementById('input').value = q;
  sendMessage();
}
function addMsg(role, html) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = `<div class="avatar">${role==='ai'?'🌿':'👤'}</div><div class="bubble">${html}</div>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}
function showThinking() {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ai'; d.id = 'thinking';
  d.innerHTML = `<div class="avatar">🌿</div><div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function fmt(s) {
  return s
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/【(.+?)】/g,'<span class="highlight">【$1】</span>')
    .replace(/\n/g,'<br>');
}

async function fetchKB(query) {
  const kw = encodeURIComponent(query.slice(0,12));
  try {
    const [r1, r2] = await Promise.all([
      fetch(`${WORKER}/rest/v1/knowledge_base?question=ilike.*${kw}*&limit=4&select=question,answer`),
      fetch(`${WORKER}/rest/v1/knowledge_base?answer=ilike.*${kw}*&limit=4&select=question,answer`)
    ]);
    const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
    const all = [...(d1||[]), ...(d2||[])];
    const seen = new Set();
    return all.filter(r => { if(seen.has(r.question)) return false; seen.add(r.question); return true; }).slice(0,5);
  } catch(e) { return []; }
}

async function sendMessage() {
  if (busy) return;
  const inp = document.getElementById('input');
  const q = inp.value.trim();
  if (!q) return;
  inp.value = ''; inp.style.height = 'auto';
  busy = true;
  document.getElementById('sendBtn').disabled = true;

  addMsg('user', esc(q));
  showThinking();

  const kb = await fetchKB(q);

  let system = `你是綠佳利（環貫綠佳利股份有限公司）的 AI 業務助理，協助業務夥伴回答問題。

風格：溫暖有力、理性感性兼具、繁體中文、簡潔有力不冗長。

核心優勢：
- 1999年日本成立，台灣2002年合法報備（統編80538622）
- 再生醫學賽道，全球獨家喚活（幹細胞活化技術）
- 黃金三角：識霸（護衛）＋ 活美水（清道夫）＋ 喚活（建設）
- 20年從不延誤獎金，撥發率透明公開
- 零囤貨訂閱制，下線可超越上線，公平競爭
- 合法查詢：https://fair.ftc.gov.tw`;

  if (kb.length > 0) {
    system += '\n\n【知識庫參考資料】\n' + kb.map(k => `Q:${k.question}\nA:${k.answer}`).join('\n\n');
    system += '\n\n請參考以上資料，用自己的方式自然表達。';
  }

  try {
    // 透過 Cloudflare Worker 呼叫 Claude
    const res = await fetch(`${WORKER}/claude`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 800,
        system,
        messages: [{ role: 'user', content: q }]
      })
    });

    document.getElementById('thinking')?.remove();

    if (res.ok) {
      const data = await res.json();
      const answer = data.content?.[0]?.text;
      if (answer) {
        addMsg('ai', fmt(answer));
      } else {
        throw new Error('no content');
      }
    } else {
      throw new Error('api error');
    }
  } catch(e) {
    document.getElementById('thinking')?.remove();
    if (kb.length > 0) {
      addMsg('ai', fmt(kb[0].answer));
    } else {
      addMsg('ai', '抱歉，暫時無法回應。請直接聯繫您的業務夥伴！');
    }
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('input').focus();
}
</script>
</body>
</html>
